<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 320px;
            padding: 16px;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            margin: 0;
            background: #191A1C;
            color: #e6ebf2;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid #483d66;
            padding-bottom: 12px;
        }

        .header h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 500;
            color: #CE6B39;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #26282B;
            padding: 12px 16px;
            border-radius: 8px;
            border-left: 4px solid #CE6B39;
        }

        .toggle-label {
            font-size: 15px;
            font-weight: 500;
        }

        .toggle-status {
            font-size: 13px;
            color: #a9b4c4;
        }

        /* Switch toggle */
        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #6f7d91;
            transition: .2s;
            border-radius: 26px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .2s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #CE6B39;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .customization-section {
            background: #26282B;
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #483d66;
        }

        .section-title {
            color: #CE6B39;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-title svg {
            fill: #CE6B39;
        }

        .color-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .color-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        .color-label {
            flex: 1;
            color: #a9b4c4;
        }

        .color-input {
            width: 70px;
            height: 30px;
            border: 2px solid #483d66;
            border-radius: 4px;
            cursor: pointer;
            background: transparent;
        }

        .color-input::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .color-input::-webkit-color-swatch {
            border: none;
            border-radius: 4px;
        }

        .color-value {
            width: 70px;
            background: #191A1C;
            border: 1px solid #483d66;
            border-radius: 4px;
            padding: 4px 6px;
            color: #e6ebf2;
            font-size: 11px;
            font-family: monospace;
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #CE6B39;
            color: #191A1C;
        }

        .btn-primary:hover {
            background: #b85a2c;
        }

        .btn-secondary {
            background: #483d66;
            color: #e6ebf2;
        }

        .btn-secondary:hover {
            background: #5a4c7d;
        }

        .btn-reset {
            background: transparent;
            color: #CE6B39;
            border: 1px solid #CE6B39;
        }

        .btn-reset:hover {
            background: rgba(206, 107, 57, 0.1);
        }

        .footer {
            font-size: 11px;
            color: #6f7d91;
            text-align: center;
            margin-top: 8px;
        }

        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            background: #483d66;
            color: #e6ebf2;
        }

        .success-message {
            color: #4CAF50;
            font-size: 12px;
            text-align: center;
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .success-message.show {
            opacity: 1;
        }

        .toggle-section {
            cursor: pointer;
            user-select: none;
        }

        .arrow-icon {
            transition: transform 0.3s;
        }

        .arrow-icon.rotated {
            transform: rotate(90deg);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>CustOmnivox - Dark mode</h1>
        <span class="status-badge" id="versionBadge">v1.4</span>
    </div>

    <div class="toggle-container">
        <div>
            <div class="toggle-label">Activer le thème</div>
            <div class="toggle-status" id="statusText">Activé</div>
        </div>
        <label class="switch">
            <input type="checkbox" id="themeToggle" checked>
            <span class="slider"></span>
        </label>
    </div>

    <div class="customization-section">
        <div class="section-title toggle-section" id="toggleColorsBtn">
            <svg class="arrow-icon" width="16" height="16" viewBox="0 0 24 24">
                <path d="M8 5v14l11-7z"/>
            </svg>
            Personnaliser les couleurs
        </div>

        <div id="colorCustomization" style="display: none;">
            <div class="color-grid" id="colorGrid">
                <!-- Les champs de couleur seront générés par JavaScript -->
            </div>

            <div class="button-group">
                <button class="btn btn-primary" id="applyColorsBtn">Appliquer</button>
            </div>

            <div id="successMessage" class="success-message">Couleurs appliquées avec succès !</div>
        </div>
    </div>

    <div class="footer">
        CustOmnivox • Personnalisez votre thème
    </div>
</div>

<script src="popup.js"></script>
</body>
</html>
