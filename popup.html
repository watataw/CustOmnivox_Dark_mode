<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 280px;
            padding: 16px;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            margin: 0;
            background: #191A1C;
            color: #e6ebf2;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid #483d66;
            padding-bottom: 12px;
        }

        .header h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 500;
            color: #CE6B39;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #26282B;
            padding: 12px 16px;
            border-radius: 8px;
            border-left: 4px solid #CE6B39;
        }

        .toggle-label {
            font-size: 15px;
            font-weight: 500;
        }

        .toggle-status {
            font-size: 13px;
            color: #a9b4c4;
        }

        /* Switch toggle */
        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #6f7d91;
            transition: .2s;
            border-radius: 26px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .2s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #CE6B39;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .info-box {
            background: #26282B;
            border-radius: 8px;
            padding: 12px;
            font-size: 13px;
            color: #a9b4c4;
            border: 1px solid #483d66;
        }

        .info-box strong {
            color: #CE6B39;
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .info-box p {
            margin: 4px 0;
        }

        .footer {
            font-size: 11px;
            color: #6f7d91;
            text-align: center;
            margin-top: 8px;
        }

        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            background: #483d66;
            color: #e6ebf2;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>CustOmnivox - Dark mode</h1>
        <span class="status-badge" id="versionBadge">v1.1</span>
    </div>

    <div class="toggle-container">
        <div>
            <div class="toggle-label">Activer le thème</div>
            <div class="toggle-status" id="statusText">Activé</div>
        </div>
        <label class="switch">
            <input type="checkbox" id="themeToggle" checked>
            <span class="slider"></span>
        </label>
    </div>

    <div class="footer">
        CustOmnivox • Cliquez pour activer/désactiver
    </div>
</div>

<script src="popup.js"></script>
</body>
</html>
